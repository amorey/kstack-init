apiVersion: v1
kind: Pod
metadata:
  name: hello
  labels:
    app: hello
    kstack-eval/scenario: _placeholder
spec:
  restartPolicy: Never
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "echo hello; sleep 3600"]
      resources:
        requests: {cpu: 10m, memory: 16Mi}
        limits:   {cpu: 50m, memory: 32Mi}
