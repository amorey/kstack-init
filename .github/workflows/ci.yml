name: ci

permissions:
  contents: read

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Run shellcheck
        run: ./scripts/lint.sh

  bats:
    strategy:
      fail-fast: false
      matrix:
        os:
          - linux
          - macos-15
          - macos-26
          - windows
        arch:
          - amd64
          - arm64
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-24.04
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: macos-15
            arch: amd64
            runner: macos-15-intel
          - os: macos-15
            arch: arm64
            runner: macos-15
          - os: macos-26
            arch: arm64
            runner: macos-26
          - os: windows
            arch: amd64
            runner: windows-2025
          - os: windows
            arch: arm64
            runner: windows-11-arm
        exclude:
          - os: macos-26
            arch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install bats-core + jq + parallel (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats jq parallel

      - name: Install bats-core + jq + parallel (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core jq parallel

      # Install bats-core from its official installer rather than the npm `bats`
      # package — npm ships a different (older) fork that doesn't consistently
      # honor --no-parallelize-within-files, which we rely on because Git Bash
      # lacks flock.
      - name: Install bats-core (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          git clone --depth 1 --branch v1.11.0 https://github.com/bats-core/bats-core.git /tmp/bats-core
          /tmp/bats-core/install.sh "$HOME/.local"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/bats" --version

      - name: Install jq (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: choco install jq -y

      # GNU parallel is required by `bats --jobs`. Git Bash ships Perl, so
      # install the self-contained upstream Perl script directly — avoids the
      # uncertainty of third-party Windows packaging around CMD shims.
      - name: Install GNU parallel (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL 'https://git.savannah.gnu.org/cgit/parallel.git/plain/src/parallel' \
            -o "$HOME/.local/bin/parallel"
          chmod +x "$HOME/.local/bin/parallel"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/parallel" --version | head -1

      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name  "CI"

      - name: Run test suite
        shell: bash
        run: ./scripts/test.sh

  bats-e2e:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install bats-core
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Install kind
        run: |
          curl -Lo /tmp/kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          sudo install -o root -g root -m 0755 /tmp/kind /usr/local/bin/kind
          kind version

      - name: Install kubectl
        run: |
          curl -Lo /tmp/kubectl "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 /tmp/kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Run e2e suite
        run: ./scripts/test-e2e.sh

  evals:
    # Manual-only for now. Trigger with `gh workflow run ci.yml`. Graduates
    # to PR label / nightly cron once we have real scenarios.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    concurrency:
      group: evals-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - name: Install kind
        run: |
          curl -Lo /tmp/kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          sudo install -o root -g root -m 0755 /tmp/kind /usr/local/bin/kind
          kind version

      - name: Install kubectl
        run: |
          curl -Lo /tmp/kubectl "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 /tmp/kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Install jq + yq
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          sudo curl -Lo /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KSTACK_EVAL_MAX_RUNS: 3
          KSTACK_EVAL_BUDGET_USD: "2"
        run: ./scripts/test-evals.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-artifacts
          path: tests/evals/artifacts/
          retention-days: 30
