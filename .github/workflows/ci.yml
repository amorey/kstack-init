name: ci

permissions:
  contents: read

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  bats:
    strategy:
      fail-fast: false
      matrix:
        os:
          - linux
          - macos-15
          - macos-26
          - windows
        arch:
          - amd64
          - arm64
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-24.04
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: macos-15
            arch: amd64
            runner: macos-15-intel
          - os: macos-15
            arch: arm64
            runner: macos-15
          - os: macos-26
            arch: arm64
            runner: macos-26
          - os: windows
            arch: amd64
            runner: windows-2025
          - os: windows
            arch: arm64
            runner: windows-11-arm
        exclude:
          - os: macos-26
            arch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install bats-core (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Install bats-core (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core

      - name: Install bats-core (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git "$RUNNER_TEMP/bats"
          "$RUNNER_TEMP/bats/install.sh" "$HOME/.local"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name  "CI"

      - name: Run test suite
        shell: bash
        run: ./scripts/test.sh
